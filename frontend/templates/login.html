{% extends "base.html" %}
{% block title %}Connexion{% endblock %}
{% block content %}
<div class="card">
  <h1 class="card-title">Connexion</h1>
  <p class="card-subtitle">Entrez vos identifiants et votre code 2FA</p>

  {% if error %}
  <div class="alert alert-error">{{ error }}</div>
  {% endif %}

  <form method="POST">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <label for="username">Nom d'utilisateur</label>
    <input type="text" id="username" name="username" maxlength="50" required autofocus>

    <label for="password">Mot de passe</label>
    <input type="password" id="password" name="password" maxlength="128" required>

    <label for="totp_code">Code 2FA</label>
    <input type="text" id="totp_code" name="totp_code"
           placeholder="000000" maxlength="6" pattern="\d{6}" inputmode="numeric"
           style="letter-spacing: 0.3em; font-size: 1.2rem; text-align: center;"
           required>

    <button type="submit" class="btn btn-primary">Se connecter</button>
  </form>

  <hr class="divider">
  <p style="text-align:center; color: var(--text-muted); font-size:0.9rem">
    Pas encore de compte ? <a href="/register" class="link">Créer un compte</a>
  </p>
</div>
{% endblock %}
