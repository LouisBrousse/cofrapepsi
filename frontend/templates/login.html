{% extends "base.html" %}
{% block title %}Connexion{% endblock %}
{% block content %}
<h1>Connexion</h1>
{% if error %}<div class="error">{{ error }}</div>{% endif %}
<form method="POST">
  <label for="username">Nom d'utilisateur</label>
  <input type="text" id="username" name="username" required autofocus>

  <label for="password">Mot de passe</label>
  <input type="password" id="password" name="password" required>

  <label for="totp_code">Code 2FA</label>
  <input type="text" id="totp_code" name="totp_code" placeholder="6 chiffres" maxlength="6" required>

  <button type="submit">Se connecter</button>
</form>
<p style="margin-top:1rem">Pas encore de compte ? <a href="/register">Créer un compte</a></p>
{% endblock %}
