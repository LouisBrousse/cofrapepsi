{% extends "base.html" %}
{% block title %}Tableau de bord{% endblock %}
{% block content %}
<div class="card" style="text-align: center;">
  <div style="font-size: 3rem; margin-bottom: 1rem;">✓</div>
  <h1 class="card-title">Authentification réussie</h1>
  <p class="card-subtitle">Connecté en tant que <strong style="color: var(--text);">{{ username }}</strong></p>

  <div class="alert alert-success">
    Votre identité a été vérifiée avec succès.
  </div>

  <a href="/logout" class="btn btn-secondary" style="margin-top: 0.5rem;">Se déconnecter</a>
</div>
{% endblock %}
