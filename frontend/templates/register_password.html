{% extends "base.html" %}
{% block title %}Votre mot de passe{% endblock %}
{% block content %}
<div class="card">
  <div class="steps">
    <div class="step done"></div>
    <div class="step active"></div>
    <div class="step"></div>
  </div>
  <h1 class="card-title">Votre mot de passe</h1>
  <p class="card-subtitle">Étape 2 — Sauvegardez vos identifiants</p>

  {% if error %}
  <div class="alert alert-error">{{ error }}</div>
  {% endif %}

  <div class="alert alert-error" style="background: #1c1a05; border-color: #ca8a04; color: #fde68a;">
    ⚠️ Ce mot de passe ne sera <strong>plus affiché</strong>. Notez-le ou scannez le QR code.
  </div>

  <div class="qr-container">
    <img src="data:image/png;base64,{{ qr_code }}" alt="QR Code mot de passe">
  </div>

  <label>Mot de passe généré</label>
  <div class="password-box">{{ password }}</div>

  <form method="POST" action="/register/2fa">
    <button type="submit" class="btn btn-primary">Configurer le 2FA →</button>
  </form>
</div>
{% endblock %}
